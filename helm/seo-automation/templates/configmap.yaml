apiVersion: v1
kind: ConfigMap
metadata:
  name: seo-automation-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "seo-automation.labels" . | nindent 4 }}
data:
  ENVIRONMENT: {{ .Values.env.ENVIRONMENT | quote }}
  LOG_LEVEL: {{ .Values.env.LOG_LEVEL | quote }}
  SITE_NAME: {{ .Values.env.SITE_NAME | quote }}
  SITE_URL: {{ .Values.env.SITE_URL | quote }}
  CELERY_BROKER_URL: {{ .Values.env.CELERY_BROKER_URL | quote }}
  CELERY_RESULT_BACKEND: {{ .Values.env.CELERY_RESULT_BACKEND | quote }}
  KEYWORD_DISCOVERY_URL: {{ .Values.env.KEYWORD_DISCOVERY_URL | quote }}
  COMPETITOR_ANALYSIS_URL: {{ .Values.env.COMPETITOR_ANALYSIS_URL | quote }}
  CONTENT_GENERATION_URL: {{ .Values.env.CONTENT_GENERATION_URL | quote }}
  SEO_OPTIMIZATION_URL: {{ .Values.env.SEO_OPTIMIZATION_URL | quote }}
  PUBLISHING_URL: {{ .Values.env.PUBLISHING_URL | quote }}
  SEO_ANALYTICS_URL: {{ .Values.env.SEO_ANALYTICS_URL | quote }}
  DEFAULT_ARTICLE_WORD_COUNT: {{ .Values.env.DEFAULT_ARTICLE_WORD_COUNT | quote }}
  ARTICLES_PER_WEEK: {{ .Values.env.ARTICLES_PER_WEEK | quote }}
