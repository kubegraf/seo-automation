apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-generation
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "seo-automation.labels" . | nindent 4 }}
    app.kubernetes.io/component: content-generation
spec:
  replicas: {{ .Values.replicaCount.contentGeneration }}
  selector:
    matchLabels:
      app: content-generation
  template:
    metadata:
      labels:
        app: content-generation
    spec:
      containers:
        - name: content-generation
          image: "{{ .Values.image.registry }}/{{ .Values.image.organization }}/seo-content-generation:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: seo-automation-config
            - secretRef:
                name: seo-automation-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources.contentGeneration | nindent 12 }}
{{- if .Values.autoscaling.contentGeneration.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: content-generation-hpa
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: content-generation
  minReplicas: {{ .Values.autoscaling.contentGeneration.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.contentGeneration.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.contentGeneration.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.contentGeneration.targetMemoryUtilizationPercentage }}
{{- end }}
