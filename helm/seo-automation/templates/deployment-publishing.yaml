apiVersion: apps/v1
kind: Deployment
metadata:
  name: publishing
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "seo-automation.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.publishing }}
  selector:
    matchLabels:
      app: publishing
  template:
    metadata:
      labels:
        app: publishing
    spec:
      containers:
        - name: publishing
          image: "{{ .Values.image.registry }}/{{ .Values.image.organization }}/seo-publishing:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: seo-automation-config
            - secretRef:
                name: seo-automation-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources.publishing | nindent 12 }}
