apiVersion: apps/v1
kind: Deployment
metadata:
  name: competitor-analysis
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "seo-automation.labels" . | nindent 4 }}
    app.kubernetes.io/component: competitor-analysis
spec:
  replicas: {{ .Values.replicaCount.competitorAnalysis }}
  selector:
    matchLabels:
      app: competitor-analysis
  template:
    metadata:
      labels:
        app: competitor-analysis
    spec:
      containers:
        - name: competitor-analysis
          image: "{{ .Values.image.registry }}/{{ .Values.image.organization }}/seo-competitor-analysis:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: seo-automation-config
            - secretRef:
                name: seo-automation-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources.competitorAnalysis | nindent 12 }}
