apiVersion: v1
kind: Secret
metadata:
  name: seo-automation-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "seo-automation.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.secrets.ANTHROPIC_API_KEY | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.OPENAI_API_KEY | quote }}
  SERPAPI_KEY: {{ .Values.secrets.SERPAPI_KEY | quote }}
  GITHUB_TOKEN: {{ .Values.secrets.GITHUB_TOKEN | quote }}
  DATABASE_URL: {{ .Values.secrets.DATABASE_URL | quote }}
  REDIS_URL: {{ .Values.secrets.REDIS_URL | quote }}
  SECRET_KEY: {{ .Values.secrets.SECRET_KEY | quote }}
