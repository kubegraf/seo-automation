apiVersion: apps/v1
kind: Deployment
metadata:
  name: keyword-discovery
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "seo-automation.labels" . | nindent 4 }}
    app.kubernetes.io/component: keyword-discovery
spec:
  replicas: {{ .Values.replicaCount.keywordDiscovery }}
  selector:
    matchLabels:
      app: keyword-discovery
  template:
    metadata:
      labels:
        app: keyword-discovery
    spec:
      containers:
        - name: keyword-discovery
          image: "{{ .Values.image.registry }}/{{ .Values.image.organization }}/seo-keyword-discovery:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: seo-automation-config
            - secretRef:
                name: seo-automation-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources.keywordDiscovery | nindent 12 }}
{{- if .Values.autoscaling.keywordDiscovery.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: keyword-discovery-hpa
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: keyword-discovery
  minReplicas: {{ .Values.autoscaling.keywordDiscovery.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.keywordDiscovery.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.keywordDiscovery.targetCPUUtilizationPercentage }}
{{- end }}
