# =============================================================================
# SEO Automation Platform - Helm Chart Values
# =============================================================================

# Global settings
global:
  imageRegistry: "ghcr.io"
  imagePullSecrets: []
  storageClass: "standard"

# =============================================================================
# Image Configuration
# =============================================================================
image:
  registry: ghcr.io
  organization: kubegraf
  tag: "latest"
  pullPolicy: IfNotPresent

# =============================================================================
# Namespace
# =============================================================================
namespace: seo-automation

# =============================================================================
# Replica counts
# =============================================================================
replicaCount:
  scheduler: 1
  keywordDiscovery: 2
  competitorAnalysis: 2
  contentGeneration: 2
  seoOptimization: 2
  publishing: 1
  seoAnalytics: 2
  dashboard: 1
  celeryWorker: 3
  celeryBeat: 1

# =============================================================================
# Resource Limits
# =============================================================================
resources:
  scheduler:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  keywordDiscovery:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  competitorAnalysis:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  contentGeneration:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

  seoOptimization:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  publishing:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  seoAnalytics:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  dashboard:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

  celeryWorker:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

# =============================================================================
# Environment Variables
# =============================================================================
env:
  # Application
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  SITE_NAME: "Kubegraf"
  SITE_URL: "https://kubegraf.com"

  # Celery
  CELERY_BROKER_URL: "redis://redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis:6379/2"

  # Service discovery
  KEYWORD_DISCOVERY_URL: "http://keyword-discovery:8000"
  COMPETITOR_ANALYSIS_URL: "http://competitor-analysis:8000"
  CONTENT_GENERATION_URL: "http://content-generation:8000"
  SEO_OPTIMIZATION_URL: "http://seo-optimization:8000"
  PUBLISHING_URL: "http://publishing:8000"
  SEO_ANALYTICS_URL: "http://seo-analytics:8000"

  # Content settings
  DEFAULT_ARTICLE_WORD_COUNT: "2000"
  ARTICLES_PER_WEEK: "5"

# =============================================================================
# Secrets (set actual values via --set or external secrets)
# =============================================================================
secrets:
  # These should be set via --set flag or sealed secrets
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  SERPAPI_KEY: ""
  GITHUB_TOKEN: ""
  DATABASE_URL: "postgresql+asyncpg://seo_user:seo_password@postgres:5432/seo_automation"
  REDIS_URL: "redis://redis:6379/0"
  SECRET_KEY: "change-me-in-production"

# =============================================================================
# PostgreSQL (using bitnami chart or custom)
# =============================================================================
postgresql:
  enabled: true
  auth:
    username: seo_user
    password: seo_password
    database: seo_automation
  primary:
    persistence:
      enabled: true
      size: 20Gi
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"

# =============================================================================
# Redis
# =============================================================================
redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

# =============================================================================
# Ingress Configuration
# =============================================================================
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: seo-dashboard.kubegraf.com
      paths:
        - path: /
          pathType: Prefix
          service: dashboard
          port: 8501
    - host: seo-api.kubegraf.com
      paths:
        - path: /scheduler
          pathType: Prefix
          service: scheduler
          port: 8000
  tls:
    - secretName: seo-automation-tls
      hosts:
        - seo-dashboard.kubegraf.com
        - seo-api.kubegraf.com

# =============================================================================
# HPA (Horizontal Pod Autoscaler)
# =============================================================================
autoscaling:
  contentGeneration:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  keywordDiscovery:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

# =============================================================================
# Probes
# =============================================================================
probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readiness:
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# Persistent Volumes
# =============================================================================
persistence:
  credentials:
    enabled: true
    size: 1Gi
    storageClass: "standard"
    accessMode: ReadOnlyMany
