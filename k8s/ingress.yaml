apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seo-automation-ingress
  namespace: seo-automation
  labels:
    app.kubernetes.io/name: seo-automation
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - secretName: seo-automation-tls
      hosts:
        - seo-dashboard.kubegraf.com
        - seo-api.kubegraf.com
  rules:
    - host: seo-dashboard.kubegraf.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 8501
    - host: seo-api.kubegraf.com
      http:
        paths:
          - path: /scheduler
            pathType: Prefix
            backend:
              service:
                name: scheduler
                port:
                  number: 8000
          - path: /keywords
            pathType: Prefix
            backend:
              service:
                name: keyword-discovery
                port:
                  number: 8000
          - path: /competitors
            pathType: Prefix
            backend:
              service:
                name: competitor-analysis
                port:
                  number: 8000
          - path: /content
            pathType: Prefix
            backend:
              service:
                name: content-generation
                port:
                  number: 8000
          - path: /analytics
            pathType: Prefix
            backend:
              service:
                name: seo-analytics
                port:
                  number: 8000
