name: Build and Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - ".gitignore"
      - "docs/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
      force_rebuild:
        description: "Force rebuild all images"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  ORG: kubegraf

jobs:
  # ==========================================================================
  # Detect changed services
  # ==========================================================================
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      scheduler: ${{ steps.filter.outputs.scheduler }}
      keyword_discovery: ${{ steps.filter.outputs.keyword_discovery }}
      competitor_analysis: ${{ steps.filter.outputs.competitor_analysis }}
      content_generation: ${{ steps.filter.outputs.content_generation }}
      seo_optimization: ${{ steps.filter.outputs.seo_optimization }}
      publishing: ${{ steps.filter.outputs.publishing }}
      seo_analytics: ${{ steps.filter.outputs.seo_analytics }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      shared: ${{ steps.filter.outputs.shared }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            scheduler:
              - 'services/scheduler/**'
            keyword_discovery:
              - 'services/keyword_discovery/**'
            competitor_analysis:
              - 'services/competitor_analysis/**'
            content_generation:
              - 'services/content_generation/**'
            seo_optimization:
              - 'services/seo_optimization/**'
            publishing:
              - 'services/publishing/**'
            seo_analytics:
              - 'services/seo_analytics/**'
            dashboard:
              - 'dashboard/**'
            shared:
              - 'shared/**'

  # ==========================================================================
  # Build Docker Images
  # ==========================================================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: detect-changes
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: scheduler
            dockerfile: services/scheduler/Dockerfile
            image: seo-scheduler
          - name: keyword-discovery
            dockerfile: services/keyword_discovery/Dockerfile
            image: seo-keyword-discovery
          - name: competitor-analysis
            dockerfile: services/competitor_analysis/Dockerfile
            image: seo-competitor-analysis
          - name: content-generation
            dockerfile: services/content_generation/Dockerfile
            image: seo-content-generation
          - name: seo-optimization
            dockerfile: services/seo_optimization/Dockerfile
            image: seo-optimization
          - name: publishing
            dockerfile: services/publishing/Dockerfile
            image: seo-publishing
          - name: seo-analytics
            dockerfile: services/seo_analytics/Dockerfile
            image: seo-analytics
          - name: dashboard
            dockerfile: dashboard/Dockerfile
            image: seo-dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.service.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ==========================================================================
  # Run Tests
  # ==========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: detect-changes

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: seo_user
          POSTGRES_PASSWORD: seo_password
          POSTGRES_DB: seo_automation_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: |
          pip install pytest pytest-asyncio httpx
          pip install -r services/keyword_discovery/requirements.txt
          pip install -r services/content_generation/requirements.txt
          pip install -r services/seo_optimization/requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://seo_user:seo_password@localhost:5432/seo_automation_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found, skipping"

  # ==========================================================================
  # Deploy to Kubernetes
  # ==========================================================================
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build-images, test]
    environment: ${{ github.event.inputs.environment || 'production' }}
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.28.0"

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: "v3.13.0"

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
          kubectl cluster-info

      - name: Deploy with Helm
        env:
          KUBECONFIG: kubeconfig.yaml
        run: |
          IMAGE_TAG="sha-$(git rev-parse --short HEAD)"

          helm upgrade --install seo-automation ./helm/seo-automation \
            --namespace seo-automation \
            --create-namespace \
            --set image.tag=${IMAGE_TAG} \
            --set secrets.ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            --set secrets.GITHUB_TOKEN="${{ secrets.CONTENT_GITHUB_TOKEN }}" \
            --set secrets.SERPAPI_KEY="${{ secrets.SERPAPI_KEY }}" \
            --set secrets.DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --set secrets.SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --wait \
            --timeout 10m \
            --atomic

      - name: Run database migrations
        env:
          KUBECONFIG: kubeconfig.yaml
        run: |
          kubectl exec -n seo-automation deployment/scheduler -- \
            alembic -c /app/migrations/alembic.ini upgrade head

      - name: Verify deployment
        env:
          KUBECONFIG: kubeconfig.yaml
        run: |
          kubectl rollout status deployment/scheduler -n seo-automation --timeout=5m
          kubectl rollout status deployment/keyword-discovery -n seo-automation --timeout=5m
          kubectl rollout status deployment/content-generation -n seo-automation --timeout=5m
          kubectl rollout status deployment/dashboard -n seo-automation --timeout=5m

      - name: Post deployment smoke test
        env:
          KUBECONFIG: kubeconfig.yaml
        run: |
          # Port forward to test health endpoints
          kubectl port-forward svc/scheduler 8000:8000 -n seo-automation &
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          echo "Smoke test passed!"

      - name: Clean up kubeconfig
        if: always()
        run: rm -f kubeconfig.yaml

  # ==========================================================================
  # Deployment Notification
  # ==========================================================================
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
