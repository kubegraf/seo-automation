name: 🤖 Kubegraf SEO Automation Pipeline

on:
  schedule:
    # Run every Monday at 02:00 UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      step:
        description: 'Run specific step (or "all" for full pipeline)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - keyword_discovery
          - competitor_analysis
          - content_generation
          - seo_optimization
          - publishing
          - backlink_automation
          - seo_analytics
      articles_per_run:
        description: 'Number of articles to generate'
        required: false
        default: '5'
        type: string

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_REPOSITORY: ${{ github.repository }}
  SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
  GSC_CREDENTIALS: ${{ secrets.GSC_CREDENTIALS }}
  ARTICLES_PER_RUN: ${{ github.event.inputs.articles_per_run || '5' }}
  KEYWORDS_PER_RUN: '30'
  PYTHONPATH: ${{ github.workspace }}

jobs:
  keyword-discovery:
    name: 🔍 Keyword Discovery
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.step == 'all' || github.event.inputs.step == 'keyword_discovery' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run keyword discovery
        run: python scripts/run_step.py keyword_discovery

      - name: Commit updated keywords
        run: |
          git config user.name "Kubegraf SEO Bot"
          git config user.email "seo-bot@kubegraf.io"
          git add data/keywords.json
          git diff --staged --quiet || git commit -m "🔍 Update keywords [skip ci]"
          git push

  competitor-analysis:
    name: 🔬 Competitor Analysis
    runs-on: ubuntu-latest
    needs: keyword-discovery
    if: ${{ github.event.inputs.step == 'all' || github.event.inputs.step == 'competitor_analysis' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run competitor analysis
        run: python scripts/run_step.py competitor_analysis

      - name: Commit competitor data
        run: |
          git config user.name "Kubegraf SEO Bot"
          git config user.email "seo-bot@kubegraf.io"
          git add data/competitors.json
          git diff --staged --quiet || git commit -m "🔬 Update competitor analysis [skip ci]"
          git push

  content-generation:
    name: ✍️ Content Generation
    runs-on: ubuntu-latest
    needs: competitor-analysis
    if: ${{ github.event.inputs.step == 'all' || github.event.inputs.step == 'content_generation' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Generate articles
        run: python scripts/run_step.py content_generation
        env:
          ARTICLES_PER_RUN: ${{ env.ARTICLES_PER_RUN }}

      - name: Commit generated articles
        run: |
          git config user.name "Kubegraf SEO Bot"
          git config user.email "seo-bot@kubegraf.io"
          git add data/articles.json
          git diff --staged --quiet || git commit -m "✍️ Generate ${{ env.ARTICLES_PER_RUN }} new articles [skip ci]"
          git push

  seo-optimization:
    name: ⚡ SEO Optimization
    runs-on: ubuntu-latest
    needs: content-generation
    if: ${{ github.event.inputs.step == 'all' || github.event.inputs.step == 'seo_optimization' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Optimize articles for SEO
        run: python scripts/run_step.py seo_optimization

      - name: Commit optimized articles
        run: |
          git config user.name "Kubegraf SEO Bot"
          git config user.email "seo-bot@kubegraf.io"
          git add data/articles.json
          git diff --staged --quiet || git commit -m "⚡ SEO optimize articles [skip ci]"
          git push

  publishing:
    name: 🚀 Publish to GitHub Pages
    runs-on: ubuntu-latest
    needs: seo-optimization
    if: ${{ github.event.inputs.step == 'all' || github.event.inputs.step == 'publishing' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Publish articles to docs/blog/
        run: python scripts/run_step.py publishing

      - name: Render articles to HTML
        run: python scripts/render_articles.py

      - name: Generate SEO dashboard
        run: python scripts/run_step.py dashboard

      - name: Commit published articles, HTML pages, and dashboard
        run: |
          git config user.name "Kubegraf SEO Bot"
          git config user.email "seo-bot@kubegraf.io"
          git add docs/ data/articles.json
          git diff --staged --quiet || git commit -m "🚀 Publish articles + render HTML + update dashboard [skip ci]"
          git push

  backlink-automation:
    name: 🔗 Backlink Automation
    runs-on: ubuntu-latest
    needs: publishing
    if: ${{ github.event.inputs.step == 'all' || github.event.inputs.step == 'backlink_automation' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Generate outreach drafts and create tracking issues
        run: python scripts/run_step.py backlink_automation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit backlink data
        run: |
          git config user.name "Kubegraf SEO Bot"
          git config user.email "seo-bot@kubegraf.io"
          git add data/backlinks.json
          git diff --staged --quiet || git commit -m "🔗 Update backlink outreach drafts [skip ci]"
          git push

  seo-analytics:
    name: 📊 SEO Analytics
    runs-on: ubuntu-latest
    needs: backlink-automation
    if: ${{ github.event.inputs.step == 'all' || github.event.inputs.step == 'seo_analytics' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Generate weekly SEO report + sitemap
        run: python scripts/run_step.py seo_analytics
        env:
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
          GSC_CREDENTIALS: ${{ secrets.GSC_CREDENTIALS }}

      - name: Commit SEO report, rankings, and sitemap
        run: |
          git config user.name "Kubegraf SEO Bot"
          git config user.email "seo-bot@kubegraf.io"
          git add data/seo_reports.json data/rankings.json docs/sitemap.xml
          git diff --staged --quiet || git commit -m "📊 Weekly SEO report + sitemap [skip ci]"
          git push

  pipeline-summary:
    name: 📋 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [keyword-discovery, competitor-analysis, content-generation, seo-optimization, publishing, backlink-automation, seo-analytics]
    if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.step == 'all') }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Print pipeline summary
        run: |
          python -c "
          import sys, json
          from pathlib import Path
          sys.path.insert(0, '.')
          from shared import storage

          articles    = storage.load_articles()
          keywords    = storage.load_keywords()
          competitors = storage.load_competitors()
          reports     = storage.load_reports()
          published   = [a for a in articles if a.status == 'published']

          backlinks_path = Path('data/backlinks.json')
          backlinks = json.loads(backlinks_path.read_text()) if backlinks_path.exists() else []

          rankings_path = Path('data/rankings.json')
          rankings = json.loads(rankings_path.read_text()) if rankings_path.exists() else {}

          print('=' * 60)
          print('  KUBEGRAF SEO PIPELINE SUMMARY')
          print('=' * 60)
          print(f'  Total articles  : {len(articles)}')
          print(f'  Published       : {len(published)}')
          print(f'  Keywords tracked: {len(keywords)}')
          print(f'  Competitors     : {len(competitors)}')
          print(f'  Backlink opps   : {len(backlinks)}')
          if articles:
              avg = sum(a.seo_score for a in articles) / len(articles)
              print(f'  Avg SEO score   : {avg:.1f}/100')
          if reports:
              r = sorted(reports, key=lambda x: x.created_at, reverse=True)[0]
              print(f'  Latest report   : {r.week}')
              real = getattr(r, \"total_real_clicks\", 0)
              if real:
                  print(f'  Real clicks(28d): {real:,}')
          print('=' * 60)
          "
