name: 🤖 Kubegraf SEO Automation Pipeline

on:
  schedule:
    # Run every Monday at 02:00 UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      step:
        description: 'Run specific step (or "all" for full pipeline)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - keyword_discovery
          - competitor_analysis
          - content_generation
          - seo_optimization
          - publishing
          - seo_analytics
      articles_per_run:
        description: 'Number of articles to generate'
        required: false
        default: '3'
        type: string

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  ARTICLES_PER_RUN: ${{ github.event.inputs.articles_per_run || '3' }}
  KEYWORDS_PER_RUN: '25'
  PYTHONPATH: ${{ github.workspace }}

jobs:
  keyword-discovery:
    name: 🔍 Keyword Discovery
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.step == 'all' || github.event.inputs.step == 'keyword_discovery' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run keyword discovery
        run: python scripts/run_step.py keyword_discovery

      - name: Commit updated keywords
        run: |
          git config user.name "Kubegraf SEO Bot"
          git config user.email "seo-bot@kubegraf.io"
          git add data/keywords.json
          git diff --staged --quiet || git commit -m "🔍 Update keywords [skip ci]"
          git push

  competitor-analysis:
    name: 🔬 Competitor Analysis
    runs-on: ubuntu-latest
    needs: keyword-discovery
    if: ${{ always() && (github.event.inputs.step == 'all' || github.event.inputs.step == 'competitor_analysis' || github.event_name == 'schedule') }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest (from previous step)
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run competitor analysis
        run: python scripts/run_step.py competitor_analysis

      - name: Commit competitor data
        run: |
          git config user.name "Kubegraf SEO Bot"
          git config user.email "seo-bot@kubegraf.io"
          git add data/competitors.json
          git diff --staged --quiet || git commit -m "🔬 Update competitor analysis [skip ci]"
          git push

  content-generation:
    name: ✍️ Content Generation
    runs-on: ubuntu-latest
    needs: competitor-analysis
    if: ${{ always() && (github.event.inputs.step == 'all' || github.event.inputs.step == 'content_generation' || github.event_name == 'schedule') }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Generate articles
        run: python scripts/run_step.py content_generation
        env:
          ARTICLES_PER_RUN: ${{ env.ARTICLES_PER_RUN }}

      - name: Commit generated articles
        run: |
          git config user.name "Kubegraf SEO Bot"
          git config user.email "seo-bot@kubegraf.io"
          git add data/articles.json
          git diff --staged --quiet || git commit -m "✍️ Generate ${{ env.ARTICLES_PER_RUN }} new articles [skip ci]"
          git push

  seo-optimization:
    name: ⚡ SEO Optimization
    runs-on: ubuntu-latest
    needs: content-generation
    if: ${{ always() && (github.event.inputs.step == 'all' || github.event.inputs.step == 'seo_optimization' || github.event_name == 'schedule') }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Optimize articles for SEO
        run: python scripts/run_step.py seo_optimization

      - name: Commit optimized articles
        run: |
          git config user.name "Kubegraf SEO Bot"
          git config user.email "seo-bot@kubegraf.io"
          git add data/articles.json
          git diff --staged --quiet || git commit -m "⚡ SEO optimize articles [skip ci]"
          git push

  publishing:
    name: 🚀 Publish to GitHub Pages
    runs-on: ubuntu-latest
    needs: seo-optimization
    if: ${{ always() && (github.event.inputs.step == 'all' || github.event.inputs.step == 'publishing' || github.event_name == 'schedule') }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Publish articles to docs/blog/
        run: python scripts/run_step.py publishing

      - name: Generate SEO dashboard
        run: python scripts/run_step.py dashboard

      - name: Commit published articles and dashboard
        run: |
          git config user.name "Kubegraf SEO Bot"
          git config user.email "seo-bot@kubegraf.io"
          git add docs/ data/articles.json
          git diff --staged --quiet || git commit -m "🚀 Publish articles + update dashboard [skip ci]"
          git push

  seo-analytics:
    name: 📊 SEO Analytics
    runs-on: ubuntu-latest
    needs: publishing
    if: ${{ always() && (github.event.inputs.step == 'all' || github.event.inputs.step == 'seo_analytics' || github.event_name == 'schedule') }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Generate weekly SEO report
        run: python scripts/run_step.py seo_analytics

      - name: Commit SEO report
        run: |
          git config user.name "Kubegraf SEO Bot"
          git config user.email "seo-bot@kubegraf.io"
          git add data/seo_reports.json
          git diff --staged --quiet || git commit -m "📊 Weekly SEO report [skip ci]"
          git push

  pipeline-summary:
    name: 📋 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [keyword-discovery, competitor-analysis, content-generation, seo-optimization, publishing, seo-analytics]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Print pipeline summary
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from shared import storage
          articles = storage.load_articles()
          keywords = storage.load_keywords()
          competitors = storage.load_competitors()
          published = [a for a in articles if a.status == 'published']
          print(f'Pipeline Summary:')
          print(f'  Total articles: {len(articles)}')
          print(f'  Published: {len(published)}')
          print(f'  Keywords tracked: {len(keywords)}')
          print(f'  Competitors analyzed: {len(competitors)}')
          if articles:
              avg_score = sum(a.seo_score for a in articles) / len(articles)
              print(f'  Avg SEO score: {avg_score:.1f}/100')
          "
